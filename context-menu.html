<!DOCTYPE html>

<!--
    Context menu custom web component

    example:

    <div tabinde=0> The host of the context menu should be tabindexed
        <context-menu> 
            The context menu subscribes itself to it's host.
            <li><button>A</button></li>
            <li><button>B</button></li>
        </context-menu>
    <div>

-->

<html>

<head>
    <style>
        menu li {
            list-style: none;
        }
    </style>
</head>

<body>
    <details>
        <summary>
            <context-menu>
                <li><button>A</button></li>
                <li><button>B</button></li>
            </context-menu>
            A
        </summary>
        <div tabindex="0">
            <context-menu>
                <li><button>A</button></li>
                <li><button>B</button></li>
                <li><button>C</button></li>
                <li><button>D</button></li>
            </context-menu>
            <p>
                Lorem ipsum dolor sit amet, consectetur adipisicing elit. Nobis soluta vel odit enim? Pariatur
                accusantium
                corporis in eius nulla culpa delectus, ipsum, corrupti, placeat voluptate laborum? Porro corrupti culpa
                commodi.
            </p>
        </div>
    </details>
</body>
<script>

    class ContextMenu extends HTMLElement {
        #open;

        constructor() {
            super()
            this.attachShadow({ mode: "open" });
            this.shadowRoot.innerHTML = `<style>
     menu {
        margin: 0;
        padding: 0.3em;
        position:absolute;
        border: 1px solid black;
        border-radius: 3px;
    }
</style>`;


        }

        connectedCallback() {
            console.log('contextmenu')

            const wrapper = document.createElement('menu');
            wrapper.setAttribute('id', 'context-menu');
            wrapper.setAttribute('popover', 'auto');

            wrapper.innerHTML = "<slot></slot>";
            wrapper.setAttribute('type', 'context');
            this.shadowRoot.appendChild(wrapper)


            this.parentElement.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                this.#open = true;
                this.render(e)
            });


            this.addEventListener('click', () => {
                console.log('click')
                this.#open = false;
                this.render()
            })
        }

        render(e) {
            const wrapper = this.shadowRoot.getElementById('context-menu');
            console.log(wrapper);
            if (this.#open) {
                wrapper.setAttribute('style', `left:${e.clientX}px;top:${e.clientY}px`);
                wrapper.showPopover();
                return;
            }
            wrapper.hidePopover()
        }
    }

    customElements.define('context-menu', ContextMenu);

</script>

</html>
